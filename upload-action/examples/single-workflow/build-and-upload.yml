name: Upload to Filecoin

# Simple single-workflow pattern - for same-repo PRs only
# NOTE: Fork PR support is currently disabled
on:
  pull_request:
    types: [opened, synchronize, reopened]
  push:
    branches: [main]

jobs:
  upload:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      actions: read        # Required for artifact reuse
      checks: write        # Required to create PR check status
      pull-requests: write # Required for PR comments

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build
        run: |
          # npm install
          # npm run build
          # or whatever builds your content
          mkdir -p dist
          echo "Built content" > dist/index.html

      # Upload to Filecoin - the action will build CAR and upload in a single flow
      - name: Upload to Filecoin
        # For production, pin to a specific version (e.g. @v1.1.0) or commit SHA instead of @master.
        uses: filecoin-project/filecoin-pin/upload-action@master
        with:
          walletPrivateKey: ${{ secrets.FILECOIN_WALLET_KEY }}
          path: dist
          network: mainnet
          minRunwayDays: "30"
          maxBalance: "5.00"
